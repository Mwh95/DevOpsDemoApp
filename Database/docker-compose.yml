services:
  postgres:
    image: postgres:18.2-trixie
    container_name: demoapp-postgres
    environment:
      POSTGRES_DB: MapMarkerDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # PG 18+ expects a single mount here; data lives in a version subdir (see docker-library/postgres#37)
      - postgres-data:/var/lib/postgresql
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MapMarkerDb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - demoapp-network

volumes:
  postgres-data:
    driver: local

networks:
  demoapp-network:
    driver: bridge
