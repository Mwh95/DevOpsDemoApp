apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demoapp-ingress
  labels:
    app: demoapp
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: map-api
            port:
              number: 8090
      - path: /public
        pathType: Prefix
        backend:
          service:
            name: map-api
            port:
              number: 8090
      - path: /keycloak/health
        pathType: Prefix
        backend:
          service:
            name: keycloak
            port:
              number: 9000
      - path: /login
        pathType: Prefix
        backend:
          service:
            name: keycloak
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: map-frontend
            port:
              number: 80
---
# Metrics path in a separate Ingress so IP allowlisting applies only to /login/metrics.
# Replace the CIDR(s) below with your allowed IP range(s), e.g. office VPN or monitoring host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demoapp-ingress-metrics
  labels:
    app: demoapp
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8,192.168.0.0/16,127.0.0.0/16"  # e.g. "1.2.3.0/24,10.0.0.0/8"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /keycloak/metrics
        pathType: Prefix
        backend:
          service:
            name: keycloak
            port:
              number: 9000
