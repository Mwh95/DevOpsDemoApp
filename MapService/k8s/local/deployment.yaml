apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-api
  labels:
    app: map-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: map-api
  template:
    metadata:
      labels:
        app: map-api
    spec:
      automountServiceAccountToken: false
      containers:
      - name: map-api
        image: map-api:dev
        imagePullPolicy: IfNotPresent
        env:
        - name: PORT
          value: "8090"
        - name: PG_HOST
          valueFrom:
            configMapKeyRef:
              name: map-api-config
              key: PG_HOST
        - name: PG_PORT
          value: "5432"
        - name: PG_DATABASE
          valueFrom:
            configMapKeyRef:
              name: map-api-config
              key: PG_DATABASE
        - name: PG_USER
          valueFrom:
            secretKeyRef:
              name: map-api-db-secret
              key: username
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: map-api-db-secret
              key: password
        - name: DATABASE_URL_SUFFIX
          valueFrom:
            configMapKeyRef:
              name: map-api-config
              key: DATABASE_URL_SUFFIX
        - name: KEYCLOAK_ISSUER
          valueFrom:
            configMapKeyRef:
              name: map-api-config
              key: KEYCLOAK_ISSUER
        - name: KEYCLOAK_JWKS_URL
          valueFrom:
            configMapKeyRef:
              name: map-api-config
              key: KEYCLOAK_JWKS_URL
        ports:
        - name: http
          containerPort: 8090
        readinessProbe:
          httpGet:
            path: /public/health/ready
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /public/health/live
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "256Mi"
            cpu: "500m"
            ephemeral-storage: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: map-api
  labels:
    app: map-api
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8090
    targetPort: 8090
  selector:
    app: map-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: map-api-config
data:
  PG_HOST: "host.minikube.internal"
  PG_DATABASE: "MapMarkerDb"
  DATABASE_URL_SUFFIX: "?sslmode=disable&search_path=mapservice"
  KEYCLOAK_ISSUER: "http://localhost:50594/login/realms/master"
  KEYCLOAK_JWKS_URL: "http://keycloak:8080/login/realms/master/protocol/openid-connect/certs"
---
apiVersion: v1
kind: Secret
metadata:
  name: map-api-db-secret
type: Opaque
stringData:
  username: "mapservice"
  password: "mapservice"
