apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-frontend
  labels:
    app: map-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: map-frontend
  template:
    metadata:
      labels:
        app: map-frontend
    spec:
      automountServiceAccountToken: false
      containers:
      - name: map-frontend
        image: map-frontend:dev
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
            ephemeral-storage: "256Mi"
          limits:
            memory: "128Mi"
            cpu: "250m"
            ephemeral-storage: "512Mi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: map-frontend-config
data:
  # Build-time values: pass as --build-arg when running docker build.
  # Tracked here as the single source of truth for the local environment.
  VITE_OIDC_AUTHORITY: "http://localhost:50594/login/realms/users"
  VITE_OIDC_CLIENT_ID: "map-app"
  VITE_OIDC_REDIRECT_URI: "http://localhost:50594/"
---
apiVersion: v1
kind: Service
metadata:
  name: map-frontend
  labels:
    app: map-frontend
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
  selector:
    app: map-frontend
